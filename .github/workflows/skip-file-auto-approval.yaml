name: skip-file-auto-approval

on:
  pull_request:
    paths:
      - '**/APPLY_PIPELINE_SKIP_THIS_NAMESPACE'

jobs:
  commit-check:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    env:
      GITHUB_REF: §{{ github.ref }}
      GITHUB_REPOSITORY: §{{ github.event.repository.name }}
      FILE_NAME: "APPLY_PIPELINE_SKIP_THIS_NAMESPACE"
    steps:
    - name: checkout
      uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

    - id: commit-check
      name: commit check
      uses: docker://ministryofjustice/cloud-platform-commit-check@sha256:69919e9dd016e056d768b3d71ee81f6ad896fd23ed5c6175b8fc9e8ddba2e9f0 #1.0.0

# Auto Approval was here. Removed because of flagged external action, see history for old code. Could be replaced with non-external alternative 

    - name: cloud platform approval needed
#      if: ${{ steps.commit-check.outputs.approval == 'approval_needed' }}
      uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.0.1
      with:
        github-token: "${{ secrets.HAMMER_BOT_TOKEN }}"
        script: |
          github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: 'This PR requires approval from the Cloud Platform team. Please wait for a member of the team to review.'
            })
