---
kind: Role
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: hmpps-templates-dev-developer-reader
  namespace: hmpps-templates-dev
rules:
  # Read-only access for workload troubleshooting and logs.
  - apiGroups: [""]
    resources: ["pods", "pods/log", "services", "endpoints", "configmaps", "events"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments", "replicasets", "statefulsets", "daemonsets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["batch"]
    resources: ["jobs", "cronjobs"]
    verbs: ["get", "list", "watch"]
---
kind: RoleBinding
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: hmpps-templates-dev-developer-reader
  namespace: hmpps-templates-dev
subjects:
  - kind: Group
    name: "github:hmpps-kotlin"
    apiGroup: rbac.authorization.k8s.io
  - kind: Group
    name: "github:hmpps-typescript"
    apiGroup: rbac.authorization.k8s.io
roleRef:
  kind: Role
  name: hmpps-templates-dev-developer-reader
  apiGroup: rbac.authorization.k8s.io
---
kind: RoleBinding
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: hmpps-templates-dev-admin
  namespace: hmpps-templates-dev
subjects:
############## COPY - DO NOT REPLACE ##############
  - kind: Group
    name: "github:hmpps-sre"
    apiGroup: rbac.authorization.k8s.io
# hmpps-sre group is required for support functions
###################################################
roleRef:
  kind: ClusterRole
  name: admin
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: ephemeral-container-access
  namespace: hmpps-templates-dev
rules:
- apiGroups: [""]
  resources: ["pods/ephemeralcontainers"]
  verbs: ["get", "patch", "update", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: ephemeral-container-access-binding
  namespace: hmpps-templates-dev
subjects:
  - kind: Group
    name: "github:hmpps-sre"
    apiGroup: rbac.authorization.k8s.io
  - kind: Group
    name: "github:hmpps-kotlin"
    apiGroup: rbac.authorization.k8s.io
  - kind: Group
    name: "github:hmpps-typescript"
    apiGroup: rbac.authorization.k8s.io
roleRef:
  kind: Role
  name: ephemeral-container-access
  apiGroup: rbac.authorization.k8s.io