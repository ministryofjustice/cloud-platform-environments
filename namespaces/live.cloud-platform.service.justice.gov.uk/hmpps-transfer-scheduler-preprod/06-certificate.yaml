---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: hmpps-transfer-scheduler-preprod-cert
  namespace: hmpps-transfer-scheduler-preprod
spec:
  secretName: hmpps-transfer-scheduler-api-cert
  issuerRef:
    name: letsencrypt-production
    kind: ClusterIssuer
  dnsNames:
    - transfer-scheduler-api-preprod.hmpps.service.justice.gov.uk
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: hmpps-transfer-scheduler-ui-preprod-cert
  namespace: hmpps-transfer-scheduler-preprod
spec:
  secretName: hmpps-transfer-scheduler-ui-cert
  issuerRef:
    name: letsencrypt-production
    kind: ClusterIssuer
  dnsNames:
    - transfer-scheduler-preprod.hmpps.service.justice.gov.uk
