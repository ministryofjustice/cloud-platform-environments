apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  namespace: hmpps-manage-and-deliver-accredited-programmes-prod
  labels:
    role: alert-rules
    namespace: hmpps-manage-and-deliver-accredited-programmes-prod
  name: hmpps-manage-and-deliver-accredited-programmes-prod
spec:

  groups:
  - name: hmpps-manage-and-deliver-accredited-programmes-prod
    rules:

    - alert: Quota-Exceeded
      expr: 100 * kube_resourcequota{job="kube-state-metrics",type="used",namespace="hmpps-manage-and-deliver-accredited-programmes-prod"} / ignoring(instance, job, type) (kube_resourcequota{job="kube-state-metrics",type="hard",namespace="hmpps-manage-and-deliver-accredited-programmes-prod"} > 0) > 90
      for: 1m
      labels:
        severity: hmpps-accredited-programmes-manage-and-deliver-alerts-prod
      annotations:
        message: Namespace {{ $labels.namespace }} is using {{ printf "%0.0f" $value}}% of its {{ $labels.resource }} quota.

    - alert: KubePod-NotReady
      expr: |-
        sum by (namespace, pod) (kube_pod_status_phase{namespace="hmpps-manage-and-deliver-accredited-programmes-prod", job="kube-state-metrics", phase=~"Pending|Unknown"}) > 0
      for: 15m
      labels:
        severity: hmpps-accredited-programmes-manage-and-deliver-alerts-prod
      annotations:
        message: Namespace {{ $labels.namespace }} - Pod {{ $labels.pod }} has been in a non-ready state for longer than 15 minutes

    - alert: KubePod-CrashLooping
      expr: |-
        rate(kube_pod_container_status_restarts_total{job="kube-state-metrics", namespace="hmpps-manage-and-deliver-accredited-programmes-prod"}[10m]) * 60 * 10 > 3
      for: 10m
      labels:
        severity: hmpps-accredited-programmes-manage-and-deliver-alerts-prod
      annotations:
        message: Namespace {{ $labels.namespace }} - Pod {{ $labels.pod }} ({{ $labels.container }}) is restarting {{ printf "%.2f" $value }} times every 10 minutes

    - alert: KubeDeployment-ReplicasMismatch
      expr: |-
        kube_deployment_spec_replicas{job="kube-state-metrics", namespace="hmpps-manage-and-deliver-accredited-programmes-prod"}
          != kube_deployment_status_replicas_available{job="kube-state-metrics", namespace="hmpps-manage-and-deliver-accredited-programmes-prod"}
      for: 15m
      labels:
        severity: hmpps-accredited-programmes-manage-and-deliver-alerts-prod
      annotations:
        message: Namespace {{ $labels.namespace }} - Deployment {{ $labels.deployment }} has not matched the expected number of replicas for longer than 15 minutes

    - alert: CronJobStatusFailed
      expr: |-
        max(
          (kube_job_status_failed{namespace="hmpps-manage-and-deliver-accredited-programmes-prod"} > 0)
          + on(job_name, namespace)
          ((time() - kube_job_status_start_time{namespace="hmpps-manage-and-deliver-accredited-programmes-prod"}) < 7200)
        ) by (job_name, namespace) > 0
      for: 1m
      labels:
        severity: hmpps-accredited-programmes-manage-and-deliver-alerts-prod
      annotations:
        message: Namespace {{ $labels.namespace }} - CronJob {{ $labels.job_name }} has failed (started within the last 2 hours)
    - alert: SQS-oldest-message-hmpps-accredited-programmes-manage-and-deliver-alerts-prod
      annotations:
        message: SQS - {{ $labels.queue_name }} has message older than 15mins, check consumers are healthy.  https://grafana.live-1.cloud-platform.service.justice.gov.uk/d/AWSSQS000/aws-sqs?orgId=1&var-datasource=Cloudwatch&var-region=default&var-queue={{ $labels.queue_name }}&from=now-6h&to=now
        runbook_url: https://dsdmoj.atlassian.net/wiki/spaces/NDSS/pages/2680750089/Monitoring+and+Alerting
      expr: |-
        sum(aws_sqs_approximate_age_of_oldest_message_maximum{queue_name="hmpps-accredited-programmes-manage-and-deliver-devs-prod-mandd_queue"} offset 5m) by (queue_name) > 15 * 60
      for: 10m
      labels:
        severity: hmpps-accredited-programmes-manage-and-deliver-alerts-prod
    - alert: SQS-number-of-messages-hmpps-accredited-programmes-manage-and-deliver-alerts-prod
      annotations:
        message: SQS - {{ $labels.queue_name }} - number of messages={{ $value }} (exceeds 20), check consumers are healthy.  https://grafana.live-1.cloud-platform.service.justice.gov.uk/d/AWSSQS000/aws-sqs?orgId=1&var-datasource=Cloudwatch&var-region=default&var-queue={{ $labels.queue_name }}&from=now-6h&to=now
        runbook_url: https://dsdmoj.atlassian.net/wiki/spaces/NDSS/pages/2680750089/Monitoring+and+Alerting
      expr: |-
        sum(aws_sqs_approximate_number_of_messages_visible_maximum{queue_name="hmpps-accredited-programmes-manage-and-deliver-devs-prod-mandd_queue"} offset 5m) by (queue_name) > 20
      for: 10m
      labels:
        severity: hmpps-accredited-programmes-manage-and-deliver-alerts-prod
    - alert: SQS-events-dlq-not-empty-hmpps-accredited-programmes-manage-and-deliver-alerts-prod
      annotations:
        message: SQS Deadletter queue - {{ $labels.queue_name }} has {{ $value }} messages
        runbook_url: https://dsdmoj.atlassian.net/wiki/spaces/NDSS/pages/2680750089/Monitoring+and+Alerting
      expr: |-
        sum(aws_sqs_approximate_number_of_messages_visible_maximum{queue_name="hmpps-accredited-programmes-manage-and-deliver-devs-prod-mandd_dlq"} offset 5m) by (queue_name) > 0
      for: 10m
      labels:
        severity: hmpps-accredited-programmes-manage-and-deliver-alerts-prod
