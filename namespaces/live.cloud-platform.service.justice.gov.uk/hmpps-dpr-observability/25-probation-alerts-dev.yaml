---
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: probation-alerts-dev
  namespace: hmpps-dpr-observability
  labels:
    role: alert-rules
spec:
  groups:
  - name: probation-golden-signals-dev
    rules:
    # ============================================
    # LATENCY ALERTS
    # ============================================
    - alert: Probation-Dev-HighLatencyP95
      expr: histogram_quantile(0.95, sum(rate(http_server_requests_seconds_bucket{namespace=~"hmpps-probation-mi-.*-dev"}[5m])) by (namespace, le)) > 5
      for: 5m
      labels:
        severity: hmpps-probation-mi-ui-dev
      annotations:
        message: "[DEV] High p95 latency ({{ $value | printf \"%.2f\" }}s) in namespace {{ $labels.namespace }}"
        runbook_url: "https://dsdmoj.atlassian.net/wiki/spaces/DPR/pages/6034948576/CP+Observability+Alerts+Runbooks"
        dashboard_url: "https://grafana.live.cloud-platform.service.justice.gov.uk/d/dpr-golden-signals-java"

    # ============================================
    # ERROR RATE ALERTS
    # ============================================
    - alert: Probation-Dev-HighErrorRate
      expr: |
        (
          sum(rate(http_server_requests_seconds_count{namespace=~"hmpps-probation-mi-.*-dev", status=~"5.."}[5m])) by (namespace)
          /
          sum(rate(http_server_requests_seconds_count{namespace=~"hmpps-probation-mi-.*-dev"}[5m])) by (namespace)
        ) * 100 > 10
      for: 5m
      labels:
        severity: hmpps-probation-mi-ui-dev
      annotations:
        message: "[DEV] High error rate ({{ $value | printf \"%.1f\" }}%) in namespace {{ $labels.namespace }}"
        runbook_url: "https://dsdmoj.atlassian.net/wiki/spaces/DPR/pages/6034948576/CP+Observability+Alerts+Runbooks"
        dashboard_url: "https://grafana.live.cloud-platform.service.justice.gov.uk/d/dpr-golden-signals-java"

    # ============================================
    # SATURATION ALERTS (CPU)
    # ============================================
    - alert: Probation-Dev-HighCPUSaturation
      expr: |
        (
          sum(rate(container_cpu_usage_seconds_total{namespace=~"hmpps-probation-mi-.*-dev", container!="POD", container=~".+"}[5m])) by (namespace)
          /
          sum(kube_pod_container_resource_requests{namespace=~"hmpps-probation-mi-.*-dev", resource="cpu"}) by (namespace)
        ) * 100 > 90
      for: 10m
      labels:
        severity: hmpps-probation-mi-ui-dev
      annotations:
        message: "[DEV] High CPU saturation ({{ $value | printf \"%.1f\" }}%) in namespace {{ $labels.namespace }}"
        runbook_url: "https://dsdmoj.atlassian.net/wiki/spaces/DPR/pages/6034948576/CP+Observability+Alerts+Runbooks"
        dashboard_url: "https://grafana.live.cloud-platform.service.justice.gov.uk/d/dpr-golden-signals-java"

    # ============================================
    # SATURATION ALERTS (MEMORY)
    # ============================================
    - alert: Probation-Dev-HighMemorySaturation
      expr: |
        (
          sum(container_memory_usage_bytes{namespace=~"hmpps-probation-mi-.*-dev", container!="POD", container=~".+"}) by (namespace)
          /
          sum(kube_pod_container_resource_requests{namespace=~"hmpps-probation-mi-.*-dev", resource="memory"}) by (namespace)
        ) * 100 > 90
      for: 10m
      labels:
        severity: hmpps-probation-mi-ui-dev
      annotations:
        message: "[DEV] High memory saturation ({{ $value | printf \"%.1f\" }}%) in namespace {{ $labels.namespace }}"
        runbook_url: "https://dsdmoj.atlassian.net/wiki/spaces/DPR/pages/6034948576/CP+Observability+Alerts+Runbooks"
        dashboard_url: "https://grafana.live.cloud-platform.service.justice.gov.uk/d/dpr-golden-signals-java"

    # ============================================
    # POD HEALTH ALERTS
    # ============================================
    - alert: Probation-Dev-PodNotReady
      expr: |
        kube_pod_status_ready{namespace=~"hmpps-probation-mi-.*-dev", condition="true"} == 0
      for: 10m
      labels:
        severity: hmpps-probation-mi-ui-dev
      annotations:
        message: "[DEV] Pod {{ $labels.pod }} in {{ $labels.namespace }} is not ready"
        runbook_url: "https://dsdmoj.atlassian.net/wiki/spaces/DPR/pages/6034948576/CP+Observability+Alerts+Runbooks"
        dashboard_url: "https://grafana.live.cloud-platform.service.justice.gov.uk/d/dpr-golden-signals-java"

    - alert: Probation-Dev-PodRestarting
      expr: |
        increase(kube_pod_container_status_restarts_total{namespace=~"hmpps-probation-mi-.*-dev"}[1h]) > 5
      for: 5m
      labels:
        severity: hmpps-probation-mi-ui-dev
      annotations:
        message: "[DEV] Pod {{ $labels.pod }} in {{ $labels.namespace }} has restarted {{ $value | printf \"%.0f\" }} times in the last hour"
        runbook_url: "https://dsdmoj.atlassian.net/wiki/spaces/DPR/pages/6034948576/CP+Observability+Alerts+Runbooks"
        dashboard_url: "https://grafana.live.cloud-platform.service.justice.gov.uk/d/dpr-golden-signals-java"
