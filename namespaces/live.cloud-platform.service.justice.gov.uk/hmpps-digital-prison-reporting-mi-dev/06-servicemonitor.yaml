---
kind: NetworkPolicy
apiVersion: networking.k8s.io/v1
metadata:
  name: allow-prometheus-scraping
  namespace: hmpps-digital-prison-reporting-mi-dev
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              component: monitoring
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: hmpps-digital-prison-reporting-mi-ui
  namespace: hmpps-digital-prison-reporting-mi-dev
spec:
  selector:
    matchLabels:
      app: hmpps-digital-prison-reporting-mi-ui
  namespaceSelector:
    matchNames:
      - hmpps-digital-prison-reporting-mi-dev
  endpoints:
    - port: http
      path: /metrics
      interval: 15s

