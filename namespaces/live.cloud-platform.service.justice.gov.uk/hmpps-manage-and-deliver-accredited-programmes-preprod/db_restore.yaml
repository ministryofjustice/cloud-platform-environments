apiVersion: batch/v1
kind: CronJob
metadata:
  name: db-restore-cronjob
  namespace: hmpps-manage-and-deliver-accredited-programmes-preprod
spec:
  # Run every night at 05:45 UTC (06:45 BST) — 0:45:00 after the s3-transfer job
  schedule: "45 5 * * *"
  concurrencyPolicy: Forbid
  startingDeadlineSeconds: 600  # If the scheduler misses the window by >10min, skip this run
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 5
  jobTemplate:
    spec:
      backoffLimit: 1  # Reduced from 3 — retries re-submit RDS restores which conflict
      activeDeadlineSeconds: 5400  # Hard timeout: 90 minutes (covers 60-min poll + overhead)
      template:
        spec:
          serviceAccountName: irsa-sqlserver
          restartPolicy: OnFailure
          volumes:
            - name: backup-info
              emptyDir: {}
          initContainers:
            - name: create-rds-snapshot
              image: public.ecr.aws/aws-cli/aws-cli:2.15.15
              securityContext:
                runAsUser: 1000
                runAsNonRoot: true
                allowPrivilegeEscalation: false
                capabilities:
                  drop:
                    - ALL
                seccompProfile:
                  type: RuntimeDefault
              env:
                - name: HOME
                  value: /tmp
                - name: DATABASE_IDENTIFIER
                  valueFrom:
                    secretKeyRef:
                      name: rds-sqlserver-instance-output
                      key: database_identifier
                - name: CREATE_SNAPSHOT
                  valueFrom:
                    configMapKeyRef:
                      name: rds-sqlserver-restore-config-map
                      key: create_snapshot
              command:
                - /bin/bash
                - -c
                - |
                  set -euo pipefail

                  if [ "${CREATE_SNAPSHOT}" != "true" ]; then
                    echo "create_snapshot=${CREATE_SNAPSHOT}; skipping RDS snapshot"
                    exit 0
                  fi

                  if [ -z "${DATABASE_IDENTIFIER}" ]; then
                    echo "DATABASE_IDENTIFIER is empty"
                    exit 1
                  fi

                  TIMESTAMP=$(date +"%Y%m%d%H%M%S")
                  SNAPSHOT_ID="${DATABASE_IDENTIFIER}-${TIMESTAMP}"

                  echo "Creating snapshot: ${SNAPSHOT_ID}"

                  aws rds create-db-snapshot \
                    --db-instance-identifier "${DATABASE_IDENTIFIER}" \
                    --db-snapshot-identifier "${SNAPSHOT_ID}"

                  echo "Waiting for snapshot to become available..."

                  aws rds wait db-snapshot-available \
                    --db-snapshot-identifier "${SNAPSHOT_ID}"

                  echo "Snapshot ${SNAPSHOT_ID} is available."

            - name: find-backup-file
              image: public.ecr.aws/aws-cli/aws-cli:2.15.15
              securityContext:
                runAsUser: 1000
                runAsNonRoot: true
                allowPrivilegeEscalation: false
                capabilities:
                  drop:
                    - ALL
                seccompProfile:
                  type: RuntimeDefault
              volumeMounts:
                - name: backup-info
                  mountPath: /backup-info
              env:
                - name: HOME
                  value: /tmp
                - name: SQLSERVER_BACKUP_S3_BUCKET_NAME
                  valueFrom:
                    secretKeyRef:
                      name: sqlserver-backup-s3-bucket-output
                      key: bucket_name
              command:
                - /bin/bash
                - -c
                - |
                  set -euo pipefail

                  echo "Searching for latest backup in s3://${SQLSERVER_BACKUP_S3_BUCKET_NAME}/"

                  # Sort by filename only (not S3 listing date/time columns) so the
                  # filename-encoded date (YYYYMMDDHHmmss) determines "latest".
                  # Previously `sort` operated on the full listing line which caused
                  # older .bak files to be selected when S3 write timestamps differed
                  # from the filename date.
                  BACKUP_KEY=$(aws s3 ls "s3://${SQLSERVER_BACKUP_S3_BUCKET_NAME}/" \
                    --recursive \
                    | awk '{print $4}' \
                    | grep '\.bak$' \
                    | sort \
                    | tail -1)

                  if [ -z "${BACKUP_KEY}" ]; then
                    echo "No backup file found in s3://${SQLSERVER_BACKUP_S3_BUCKET_NAME}/"
                    exit 1
                  fi

                  echo "Found backup file: ${BACKUP_KEY}"
                  echo "${BACKUP_KEY}" > /backup-info/backup-key

            # Kubernetes native sidecar (restartPolicy: Always on an initContainer requires k8s >= 1.29).
            # Starts before the main container and is terminated automatically when it exits.
            - name: port-forward
              image: ministryofjustice/port-forward
              restartPolicy: Always
              securityContext:
                runAsNonRoot: true
                allowPrivilegeEscalation: false
                capabilities:
                  drop:
                    - ALL
                seccompProfile:
                  type: RuntimeDefault
              ports:
                - containerPort: 1433
              env:
                - name: REMOTE_HOST
                  valueFrom:
                    secretKeyRef:
                      name: rds-sqlserver-instance-output
                      key: rds_instance_address
                - name: LOCAL_PORT
                  valueFrom:
                    configMapKeyRef:
                      name: rds-sqlserver-restore-config-map
                      key: db_port
                - name: REMOTE_PORT
                  valueFrom:
                    configMapKeyRef:
                      name: rds-sqlserver-restore-config-map
                      key: db_port
          containers:
            - name: db-restore
              # mcr.microsoft.com/mssql/server:2019-latest includes sqlcmd at:
              #   /opt/mssql-tools18/bin/sqlcmd (newer builds)
              #   /opt/mssql-tools/bin/sqlcmd  (older builds)
              # The startup script probes for both. We override the container
              # entrypoint so SQL Server itself is never started.
              image: mcr.microsoft.com/mssql/server:2019-CU31-ubuntu-20.04
              imagePullPolicy: IfNotPresent
              securityContext:
                runAsUser: 10001
                runAsNonRoot: true
                allowPrivilegeEscalation: false
                capabilities:
                  drop:
                    - ALL
                seccompProfile:
                  type: RuntimeDefault
              volumeMounts:
                - name: backup-info
                  mountPath: /backup-info
              env:
                - name: DB_PORT
                  valueFrom:
                    configMapKeyRef:
                      name: rds-sqlserver-restore-config-map
                      key: db_port
                - name: DATABASE_NAME
                  valueFrom:
                    secretKeyRef:
                      name: rds-sqlserver-instance-output
                      key: database_name
                - name: DATABASE_USERNAME
                  valueFrom:
                    secretKeyRef:
                      name: rds-sqlserver-instance-output
                      key: database_username
                - name: DATABASE_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: rds-sqlserver-instance-output
                      key: database_password
                - name: SQLSERVER_BACKUP_S3_BUCKET_NAME
                  valueFrom:
                    secretKeyRef:
                      name: sqlserver-backup-s3-bucket-output
                      key: bucket_name
              command:
                - /bin/bash
                - -c
                - |
                  set -euo pipefail

                  # Locate sqlcmd binary — path differs between mssql-tools and mssql-tools18 images
                  SQLCMD=/opt/mssql-tools18/bin/sqlcmd
                  if [ ! -f "${SQLCMD}" ]; then
                    SQLCMD=/opt/mssql-tools/bin/sqlcmd
                  fi

                  BACKUP_KEY=$(cat /backup-info/backup-key)
                  if [ -z "${BACKUP_KEY}" ]; then
                    echo "ERROR: /backup-info/backup-key is empty — find-backup-file init container may have failed"
                    exit 1
                  fi
                  BACKUP_S3_ARN="arn:aws:s3:::${SQLSERVER_BACKUP_S3_BUCKET_NAME}/${BACKUP_KEY}"

                  echo "Starting restore at $(date)"
                  echo "Source : ${BACKUP_S3_ARN}"
                  echo "Target : ${DATABASE_NAME}"

                  # Wait for the port-forward sidecar to be ready
                  echo "Waiting for SQL Server to be reachable via port-forward..."
                  RETRIES=0
                  until "${SQLCMD}" \
                      -S "localhost,${DB_PORT}" \
                      -U "${DATABASE_USERNAME}" \
                      -P "${DATABASE_PASSWORD}" \
                      -C -Q "SELECT 1" > /dev/null 2>&1; do
                    RETRIES=$((RETRIES + 1))
                    if [ "${RETRIES}" -ge 30 ]; then
                      echo "Timed out waiting for SQL Server after $((RETRIES * 10))s"
                      exit 1
                    fi
                    echo "  attempt ${RETRIES}/30 — retrying in 10s..."
                    sleep 10
                  done
                  echo "SQL Server reachable."

                  # Cancel any in-progress or created restore tasks for this DB.
                  # Stuck tasks from previous failed runs block new restores and
                  # prevent the database from being dropped.
                  echo "Checking for stuck restore tasks to cancel..."
                  STUCK_TASKS=$("${SQLCMD}" \
                    -S "localhost,${DB_PORT}" \
                    -U "${DATABASE_USERNAME}" \
                    -P "${DATABASE_PASSWORD}" \
                    -h -1 -W \
                    -C -Q "SELECT task_id FROM msdb.dbo.rds_fn_task_status(NULL, NULL)
                           WHERE db_name = '${DATABASE_NAME}'
                             AND lifecycle IN ('CREATED','IN_PROGRESS');" 2>&1) || true
                  for STUCK_ID in $(echo "${STUCK_TASKS}" | grep -v '^Msg ' | grep -oE '[0-9]+'); do
                    echo "  Cancelling stuck task ${STUCK_ID}..."
                    "${SQLCMD}" \
                      -S "localhost,${DB_PORT}" \
                      -U "${DATABASE_USERNAME}" \
                      -P "${DATABASE_PASSWORD}" \
                      -C -Q "EXEC msdb.dbo.rds_cancel_task @task_id = ${STUCK_ID};" 2>&1 || true
                  done

                  # Allow cancellations to take effect before attempting drop
                  if echo "${STUCK_TASKS}" | grep -v '^Msg ' | grep -qE '[0-9]+'; then
                    echo "  Waiting 15s for task cancellations to complete..."
                    sleep 15
                  fi

                  # Kill any existing connections so the overwrite restore can proceed.
                  # This may fail if the DB doesn't exist, is recovering after an RDS
                  # auto-start, or was already dropped by a previous attempt — all OK.
                  echo "Killing active sessions on target database..."
                  "${SQLCMD}" \
                    -S "localhost,${DB_PORT}" \
                    -U "${DATABASE_USERNAME}" \
                    -P "${DATABASE_PASSWORD}" \
                    -C -Q "
                      DECLARE @sql NVARCHAR(MAX) = '';
                      SELECT @sql += 'KILL ' + CAST(session_id AS NVARCHAR(10)) + '; '
                      FROM sys.dm_exec_sessions
                      WHERE database_id = DB_ID('${DATABASE_NAME}')
                        AND session_id != @@SPID;
                      IF LEN(@sql) > 0
                      BEGIN
                        PRINT 'Killing sessions: ' + @sql;
                        EXEC sp_executesql @sql;
                      END
                      ELSE
                        PRINT 'No other sessions to kill.';" 2>&1 || echo "  (Kill sessions failed, continuing...)"

                  echo "Setting database to SINGLE_USER to clear existing connections..."
                  "${SQLCMD}" \
                    -S "localhost,${DB_PORT}" \
                    -U "${DATABASE_USERNAME}" \
                    -P "${DATABASE_PASSWORD}" \
                    -C -Q "IF DB_ID('${DATABASE_NAME}') IS NOT NULL
                          ALTER DATABASE [${DATABASE_NAME}] SET SINGLE_USER WITH ROLLBACK IMMEDIATE;
                          IF DB_ID('${DATABASE_NAME}') IS NOT NULL
                          ALTER DATABASE [${DATABASE_NAME}] SET MULTI_USER;" 2>&1 || echo "  (SINGLE_USER/MULTI_USER failed, continuing...)"

                  # Use RDS-native rds_drop_database — this handles databases in
                  # RESTORING/RECOVERING states that T-SQL DROP DATABASE cannot touch.
                  # Falls back to standard DROP DATABASE if rds_drop_database fails.
                  echo "Dropping existing database using rds_drop_database..."
                  "${SQLCMD}" \
                    -S "localhost,${DB_PORT}" \
                    -U "${DATABASE_USERNAME}" \
                    -P "${DATABASE_PASSWORD}" \
                    -C -Q "EXEC msdb.dbo.rds_drop_database @db_name = '${DATABASE_NAME}';" 2>&1 || echo "  (rds_drop_database failed — DB may not exist, continuing...)"

                  # Brief wait for the drop to propagate internally
                  sleep 10

                  # Submit the native RDS restore task.
                  # RDS pulls the .bak directly from S3 using the option-group IAM role —
                  # no file transfer into the pod is required.
                  echo "Submitting rds_restore_database task..."
                  SUBMIT_OUTPUT=$("${SQLCMD}" \
                    -S "localhost,${DB_PORT}" \
                    -U "${DATABASE_USERNAME}" \
                    -P "${DATABASE_PASSWORD}" \
                    -W \
                    -C -Q "EXEC msdb.dbo.rds_restore_database
                          @restore_db_name    = '${DATABASE_NAME}',
                          @s3_arn_to_restore_from = '${BACKUP_S3_ARN}',
                          @with_norecovery    = 0,
                          @type               = 'FULL';" 2>&1) || true

                  # Extract task_id: prefer the explicit "Task Id: <N>" line printed by
                  # rds_restore_database; fall back to the first numeric field in the
                  # result set (the task_id column is always first).
                  # First, check if the output indicates a SQL error — don't attempt
                  # extraction from error messages as numeric codes could false-match.
                  if echo "${SUBMIT_OUTPUT}" | grep -qE '^Msg [0-9]+, Level [0-9]+'; then
                    echo "rds_restore_database returned a SQL error:"
                    echo "${SUBMIT_OUTPUT}"
                    exit 1
                  fi

                  TASK_ID=$(echo "${SUBMIT_OUTPUT}" | grep -oE 'Task Id:\s*[0-9]+' | grep -oE '[0-9]+' || true)
                  if [ -z "${TASK_ID}" ]; then
                    TASK_ID=$(echo "${SUBMIT_OUTPUT}" | grep -oE '^\s*[0-9]+' | head -1 | tr -d ' ' || true)
                  fi

                  if [ -z "${TASK_ID}" ]; then
                    echo "Failed to extract task_id from submission output:"
                    echo "${SUBMIT_OUTPUT}"
                    exit 1
                  fi

                  echo "Restore task submitted. Task ID: ${TASK_ID}"
                  echo "Polling rds_task_status for task ${TASK_ID}..."

                  # Poll every 30 s; time out after 60 minutes (120 * 30s)
                  POLL_COUNT=0
                  CONSECUTIVE_FAILURES=0
                  while true; do
                    STATUS_OUTPUT=$("${SQLCMD}" \
                      -S "localhost,${DB_PORT}" \
                      -U "${DATABASE_USERNAME}" \
                      -P "${DATABASE_PASSWORD}" \
                      -h -1 -W \
                      -C -Q "EXEC msdb.dbo.rds_task_status @task_id = ${TASK_ID};" 2>&1) || true

                    echo "$(date) | ${STATUS_OUTPUT}"

                    # Extract the lifecycle column value for this task.
                    # rds_task_status returns: task_id, task_type, lifecycle, ...
                    # With @task_id filter, only one row is returned.
                    LIFECYCLE=$(echo "${STATUS_OUTPUT}" | grep -oE '\b(SUCCESS|ERROR|CANCELLED|CREATED|IN_PROGRESS)\b' | head -1 || true)

                    if [ -z "${LIFECYCLE}" ]; then
                      CONSECUTIVE_FAILURES=$((CONSECUTIVE_FAILURES + 1))
                      if [ "${CONSECUTIVE_FAILURES}" -ge 5 ]; then
                        echo "Port-forward appears dead — ${CONSECUTIVE_FAILURES} consecutive poll failures"
                        exit 1
                      fi
                    else
                      CONSECUTIVE_FAILURES=0
                    fi

                    if [ "${LIFECYCLE}" = "SUCCESS" ]; then
                      echo "Restore completed successfully at $(date)"
                      exit 0
                    fi

                    if [ "${LIFECYCLE}" = "ERROR" ] || [ "${LIFECYCLE}" = "CANCELLED" ]; then
                      echo "Restore task failed (lifecycle=${LIFECYCLE}) at $(date)"
                      exit 1
                    fi

                    POLL_COUNT=$((POLL_COUNT + 1))
                    if [ "${POLL_COUNT}" -ge 120 ]; then
                      echo "Restore timed out after 60 minutes"
                      exit 1
                    fi

                    sleep 30
                  done