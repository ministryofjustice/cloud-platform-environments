---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: api-ui-certificate
  namespace: hmpps-probation-mi-ui-dev
spec:
  secretName: hmpps-probation-mi-cert
  issuerRef:
    name: letsencrypt-production
    kind: ClusterIssuer
  dnsNames:
    - hmpps-probation-mi-ui-dev.hmpps.service.justice.gov.uk
    - hmpps-probation-mi-api-dev.hmpps.service.justice.gov.uk
