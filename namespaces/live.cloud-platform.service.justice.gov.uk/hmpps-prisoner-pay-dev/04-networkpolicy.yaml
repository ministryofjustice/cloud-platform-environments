# Deny ingress to all pods, allow ingress from pods within the namespace
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default
  namespace: hmpps-prisoner-pay-dev
spec:
  podSelector: {}
  policyTypes:
  - Ingress
  ingress:
  - from:
    - podSelector: {}
---
# Allow ingress to the prisoner pay UI on port 3000 from the ingress-default ingress controllers
kind: NetworkPolicy
apiVersion: networking.k8s.io/v1
metadata:
  name: allow-ingress-controllers-ui
  namespace: hmpps-prisoner-pay-dev
spec:
  podSelector:
    matchLabels:
      app: hmpps-prisoner-pay-ui
  policyTypes:
  - Ingress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          component: ingress-controllers
      podSelector:
        matchLabels:
          app.kubernetes.io/name: ingress-default
          app.kubernetes.io/component: controller
    ports:
    - protocol: TCP
      port: 3000
---
# Allow ingress to the prisoner pay API and Orchestrator on port 8080 from the ingress-default ingress controllers
kind: NetworkPolicy
apiVersion: networking.k8s.io/v1
metadata:
  name: allow-ingress-controllers-apis
  namespace: hmpps-prisoner-pay-dev
spec:
  podSelector:
    matchExpressions:
    - key: app
      operator: In
      values:
      - hmpps-prisoner-pay-api
      - hmpps-prisoner-pay-orchestrator-api
  policyTypes:
  - Ingress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          component: ingress-controllers
      podSelector:
        matchLabels:
          app.kubernetes.io/name: ingress-default
          app.kubernetes.io/component: controller
    ports:
    - protocol: TCP
      port: 8080
