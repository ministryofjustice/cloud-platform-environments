apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default
  namespace: kristian-helloworld
spec:
  podSelector: {}
  policyTypes:
  - Ingress
  ingress:
  - from:
    - podSelector: {}
---
kind: NetworkPolicy
apiVersion: networking.k8s.io/v1
metadata:
  name: allow-ingress-controllers
  namespace: kristian-helloworld
spec:
  podSelector: {}
  policyTypes:
  - Ingress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          component: ingress-controllers
---
apiVersion: projectcalico.org/v3
kind: NetworkPolicy
metadata:
  name: allow-dns-egress
  namespace: kristian-helloworld
spec:
  order: 43.0
  selector: all()
  egress:
  - action: Allow
    protocol: UDP
    destination:
      nets:
        - 10.100.0.10/32
      ports:
      - 53
  - action: Allow
    protocol: TCP
    destination:
      nets:
        - 10.100.0.10/32
      ports:
      - 53
  types:
  - Egress
---
apiVersion: projectcalico.org/v3
kind: NetworkPolicy
metadata:
  name: allow-kube-dns-coredns-kubedns
  namespace: kristian-helloworld
spec:
  order: 45
  selector: all()
  egress:
    - action: Allow
      protocol: UDP
      destination:
        namespaceSelector: 'kubernetes.io/metadata.name == "kube-system"'
        selector: 'k8s-app in {"kube-dns", "coredns"}'
        ports:
          - 53
    - action: Allow
      protocol: TCP
      destination:
        namespaceSelector: 'kubernetes.io/metadata.name == "kube-system"'
        selector: 'k8s-app in {"kube-dns", "coredns"}'
        ports:
          - 53
  types:
    - Egress
---
apiVersion: projectcalico.org/v3
kind: NetworkPolicy
metadata:
  name: allow-egress-envoy-https-proxy
  namespace: kristian-helloworld
spec:
  order: 46.0
  selector: all()
  egress:
  - action: Allow
    protocol: TCP
    destination:
      selector: 'app == "envoy-https-proxy"'
      ports:
      - 3128
  types:
  - Egress
---
