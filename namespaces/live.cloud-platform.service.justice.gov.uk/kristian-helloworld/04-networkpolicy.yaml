apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default
  namespace: kristian-helloworld
spec:
  podSelector: {}
  policyTypes:
  - Ingress
  ingress:
  - from:
    - podSelector: {}
---
kind: NetworkPolicy
apiVersion: networking.k8s.io/v1
metadata:
  name: allow-ingress-controllers
  namespace: kristian-helloworld
spec:
  podSelector: {}
  policyTypes:
  - Ingress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          component: ingress-controllers
---
apiVersion: projectcalico.org/v3
kind: NetworkPolicy
metadata:
  name: allow-dns-egress
  namespace: kristian-helloworld
spec:
  order: 43.0
  selector: all()
  egress:
  - action: Allow
    protocol: UDP
    destination:
      nets:
        - 10.100.0.10/32
      ports:
      - 53
  - action: Allow
    protocol: TCP
    destination:
      nets:
        - 10.100.0.10/32
      ports:
      - 53
  types:
  - Egress
---
apiVersion: projectcalico.org/v3
kind: NetworkPolicy
metadata:
  name: allow-kube-dns-coredns-kubedns
  namespace: kristian-helloworld
spec:
  order: 45
  selector: all()
  egress:
    - action: Allow
      protocol: UDP
      destination:
        namespaceSelector: 'kubernetes.io/metadata.name == "kube-system"'
        selector: 'k8s-app in {"kube-dns", "coredns"}'
        ports:
          - 53
    - action: Allow
      protocol: TCP
      destination:
        namespaceSelector: 'kubernetes.io/metadata.name == "kube-system"'
        selector: 'k8s-app in {"kube-dns", "coredns"}'
        ports:
          - 53
  types:
    - Egress
---
apiVersion: projectcalico.org/v3
kind: NetworkPolicy
metadata:
  name: allow-egress-hmpps-activities-management-api
  namespace: kristian-helloworld
spec:
  order: 49.0
  selector: all()
  egress:
  - action: Allow
    protocol: TCP
    destination:
      namespaceSelector: kubernetes.io/metadata.name == "hmpps-activities-management-dev"
      selector: 'app == "hmpps-activities-management-api"'
      ports:
      - 80
  types:
  - Egress
---
apiVersion: projectcalico.org/v3
kind: NetworkPolicy
metadata:
  name: deny-egress-order
  namespace: kristian-helloworld
spec:
  order: 51.0
  selector: all()
  egress:
  - action: Deny
  types:
  - Egress
