apiVersion: projectcalico.org/v3
kind: NetworkPolicy
metadata:
  name: allow-egress-hmpps-activities-management-api
  namespace: kristian-helloworld
spec:
  order: 49.0
  selector: all()
  egress:
  - action: Allow
    protocol: TCP
    destination:
      namespaceSelector: kubernetes.io/metadata.name == "hmpps-activities-management-dev"
