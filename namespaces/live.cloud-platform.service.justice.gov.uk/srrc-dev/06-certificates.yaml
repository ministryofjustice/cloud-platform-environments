---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: srrc-api-dev-cert
  namespace: srrc-dev
spec:
  secretName: srrc-api-dev-cert
  issuerRef:
    name: letsencrypt-production
    kind: ClusterIssuer
  dnsNames:
    - srrc-api-dev.hmpps.service.justice.gov.uk
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: srrc-dev-cert
  namespace: srrc-dev
