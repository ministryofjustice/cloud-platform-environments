apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: manage-restricted-patients-preprod.hmpps.service.justice.gov.uk
  namespace: hmpps-restricted-patients-preprod
spec:
  secretName: hmpps-restricted-patients-cert
  issuerRef:
    name: letsencrypt-production
    kind: ClusterIssuer
  dnsNames:
  - manage-restricted-patients-preprod.hmpps.service.justice.gov.uk
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: restricted-patients-api-preprod.prison.service.justice.gov.uk
  namespace: hmpps-restricted-patients-preprod
spec:
  secretName: hmpps-restricted-patients-api-cert
  issuerRef:
    name: letsencrypt-production
    kind: ClusterIssuer
  dnsNames:
    - restricted-patients-api-preprod.prison.service.justice.gov.uk
