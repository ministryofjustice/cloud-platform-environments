---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: hmpps-digital-canteen-cert
  namespace: hmpps-digital-canteen-prod
spec:
  secretName: hmpps-digital-canteen-cert
  issuerRef:
    name: letsencrypt-production
    kind: ClusterIssuer
  dnsNames:
    - digital-canteen.prison.service.justice.gov.uk

---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: hmpps-digital-canteen-medusa-cert
  namespace: hmpps-digital-canteen-prod
spec:
  secretName: hmpps-digital-canteen-medusa-cert
  issuerRef:
    name: letsencrypt-production
    kind: ClusterIssuer
  dnsNames:
    - digital-canteen-medusa.prison.service.justice.gov.uk
