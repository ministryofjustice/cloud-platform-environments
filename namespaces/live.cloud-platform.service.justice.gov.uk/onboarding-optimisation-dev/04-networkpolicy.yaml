# Deny all other egress. Must have a higher order number than allow-egress-ip above.
kind: NetworkPolicy
apiVersion: projectcalico.org/v3
metadata:
  name: block-egress
  namespace: onboarding-optimisation-dev
spec:
  order: 50.0
  selector: all()
  egress:
    - action: Deny
  types:
    - Egress
