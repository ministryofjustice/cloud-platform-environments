# Default: allow pod-to-pod ingress for all pods EXCEPT the backend.
# The backend is excluded so it can only be reached via allow-frontend-to-backend below.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default
  namespace: onboarding-optimisation-dev
spec:
  podSelector:
    matchExpressions:
      - key: app
        operator: NotIn
        values:
          - onboarding-optimisation-backend
  policyTypes:
  - Ingress
  ingress:
  - from:
    - podSelector: {}
---
# Allow the ingress controller to reach the frontend pod only.
# The backend has no public Ingress resource; it is reached only via the internal service.
kind: NetworkPolicy
apiVersion: networking.k8s.io/v1
metadata:
  name: allow-ingress-controllers
  namespace: onboarding-optimisation-dev
spec:
  podSelector:
    matchLabels:
      app: onboarding-optimisation-frontend
  policyTypes:
  - Ingress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          component: ingress-controllers
---
# Allow the frontend pod to call the backend via the internal Kubernetes service.
kind: NetworkPolicy
apiVersion: networking.k8s.io/v1
metadata:
  name: allow-frontend-to-backend
  namespace: onboarding-optimisation-dev
spec:
  podSelector:
    matchLabels:
      app: onboarding-optimisation-backend
  policyTypes:
  - Ingress
  ingress:
  - from:
    - podSelector:
        matchLabels:
          app: onboarding-optimisation-frontend
---
# Frontend egress: only what the Next.js pod needs.
# - 172.20.0.0/16: kube-dns and the backend internal service
# - Azure AD: server-side token exchange at login (callback/route.ts)
kind: NetworkPolicy
apiVersion: projectcalico.org/v3
metadata:
  name: allow-egress-frontend
  namespace: onboarding-optimisation-dev
spec:
  order: 49.0
  selector: "app == 'onboarding-optimisation-frontend'"
  egress:
    - action: Allow
      destination:
        nets:
          - 172.20.0.0/16
          # Azure AD — token exchange at login.microsoftonline.com/oauth2/v2.0/token
          - 20.190.128.0/18
          - 40.126.0.0/18
  types:
    - Egress
---
# Backend egress: all external dependencies.
# Note: 172.20.0.0/16 covers kube-dns, RDS private IP, and AWS VPC endpoints
# if configured on this cluster (confirm with Cloud Platform team).
