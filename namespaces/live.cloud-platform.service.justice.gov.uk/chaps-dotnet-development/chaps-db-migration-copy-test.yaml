apiVersion: v1
kind: Pod
metadata:
  name: chaps-db-migration-copy-test
  namespace: chaps-dotnet-development
spec:
  serviceAccountName: chaps-db-migration-copy
  restartPolicy: Never
  securityContext:
    runAsNonRoot: true
    runAsUser: 1000
    runAsGroup: 1000
    fsGroup: 1000
  containers:
    - name: awscli
      image: amazon/aws-cli:2.15.0
      command: ["/bin/sh", "-c"]
      args:
        - |
          mkdir -p /tmp/.aws
          export HOME=/tmp
          export AWS_CONFIG_FILE=/tmp/.aws/config
          export AWS_SHARED_CREDENTIALS_FILE=/tmp/.aws/credentials
          sleep 3600
      env:
        - name: HOME
          value: /tmp
        - name: AWS_CONFIG_FILE
          value: /tmp/.aws/config
        - name: AWS_SHARED_CREDENTIALS_FILE
          value: /tmp/.aws/credentials
      securityContext:
        allowPrivilegeEscalation: false
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        capabilities:
          drop:
            - ALL