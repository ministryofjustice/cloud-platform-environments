apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  namespace: laa-civil-manage-api-staging
  labels:
    role: alert-rules
  name: prometheus-custom-rules-laa-civil-manage-api-staging
spec:
  groups:
  - name: application-rules
    rules:

    - alert: NoPodsRunning
      expr: sum(kube_pod_status_phase{namespace="laa-civil-manage-api-staging", phase="Running"}) == 0 or absent(kube_pod_status_phase{namespace="laa-civil-manage-api-staging", phase="Running"})
      for: 5m
      labels:
        severity: laa-civil-manage-dev
      annotations:
        message: "CRITICAL: There are zero running pods in the laa-civil-manage-api-staging namespace."

    - alert: PodCrashLooping
      expr: kube_pod_container_status_waiting_reason{namespace="laa-civil-manage-api-staging", reason="CrashLoopBackOff"} > 0
      for: 10m
      labels:
        severity: laa-civil-manage-dev
      annotations:
        message: "Warning: a pod in namespace {{ $labels.namespace }} has been in CrashLoopBackOff for over 10 minutes."