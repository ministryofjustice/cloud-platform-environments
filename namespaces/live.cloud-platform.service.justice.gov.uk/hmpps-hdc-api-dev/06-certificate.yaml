---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: hmpps-hdc-api-dev.hmpps.service.justice.gov.uk
  namespace: hmpps-hdc-api-dev
spec:
  secretName: hmpps-hdc-api-cert
  issuerRef:
    name: letsencrypt-production
    kind: ClusterIssuer
  dnsNames:
    - hmpps-hdc-api-dev.hmpps.service.justice.gov.uk
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: cvl-probation-mock.hmpps.service.justice.gov.uk
  namespace: hmpps-hdc-api-dev
spec:
  secretName: hmpps-hdc-api-wiremock-cert
  issuerRef:
    name: letsencrypt-production
    kind: ClusterIssuer
  dnsNames:
    - cvl-probation-mock.hmpps.service.justice.gov.uk
