apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: hmpps-document-generation-api-prod-cert
  namespace: hmpps-document-generation-prod
spec:
  secretName: hmpps-document-generation-api-cert
  issuerRef:
    name: letsencrypt-production
    kind: ClusterIssuer
  dnsNames:
    - document-generation-api.hmpps.service.justice.gov.uk
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: hmpps-document-generation-ui-prod-cert
  namespace: hmpps-document-generation-prod
spec:
  secretName: hmpps-document-generation-ui-cert
  issuerRef:
    name: letsencrypt-production
    kind: ClusterIssuer
  dnsNames:
    - document-generation.hmpps.service.justice.gov.uk