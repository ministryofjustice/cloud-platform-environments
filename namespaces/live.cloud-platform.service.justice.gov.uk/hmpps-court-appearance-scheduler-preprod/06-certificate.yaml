---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: hmpps-court-appearance-scheduler-preprod-cert
  namespace: hmpps-court-appearance-scheduler-preprod
spec:
  secretName: hmpps-court-appearance-scheduler-api-cert
  issuerRef:
    name: letsencrypt-production
    kind: ClusterIssuer
  dnsNames:
    - court-appearance-scheduler-api-preprod.hmpps.service.justice.gov.uk
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: hmpps-court-appearance-scheduler-ui-preprod-cert
  namespace: hmpps-court-appearance-scheduler-preprod
spec:
  secretName: hmpps-court-appearance-scheduler-ui-cert
  issuerRef:
    name: letsencrypt-production
    kind: ClusterIssuer
  dnsNames:
    - court-appearance-scheduler-preprod.hmpps.service.justice.gov.uk
