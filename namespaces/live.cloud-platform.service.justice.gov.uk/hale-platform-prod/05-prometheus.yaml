apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  namespace: hale-platform-prod
  labels:
    prometheus: prometheus-operator
    role: alert-rules
    release: prometheus-operator
  name: prometheus-custom-rules-hale-platform
spec:
  groups:
  - name: kubernetes-apps
    rules:
    - alert: KubeQuota-Exceeded
      annotations:
        message: Namespace {{ $labels.namespace }} is using {{ printf "%0.0f" $value
          }}% of its {{ $labels.resource }} quota.
        runbook_url: https://github.com/kubernetes-monitoring/kubernetes-mixin/tree/master/runbook.md#alert-name-kubequotaexceeded
      expr: |-
        100 * kube_resourcequota{job="kube-state-metrics", type="used", namespace="hale-platform-prod"} 
        / ignoring(instance, job, type)
        (kube_resourcequota{job="kube-state-metrics", type="hard", namespace="hale-platform-prod"} > 0)
        > 90
      for: 15m
      labels:
        severity: hale-platform-alerts
    - alert: KubePodCrashLooping
      annotations:
        message: Pod {{ $labels.namespace }}/{{ $labels.pod }} ({{ $labels.container
          }}) is restarting {{ printf "%.2f" $value }} times / 5 minutes.
        runbook_url: https://github.com/kubernetes-monitoring/kubernetes-mixin/tree/master/runbook.md#alert-name-kubepodcrashlooping
      expr: |-
        rate(kube_pod_container_status_restarts_total{job="kube-state-metrics", namespace="hale-platform-prod"}[15m]) * 60 * 5 > 0
      for: 1h
      labels:
        severity: hale-platform-alerts
    - alert: KubePodNotReady
      annotations:
        message: Pod {{ $labels.namespace }}/{{ $labels.pod }} has been in a non-ready
          state for longer than an hour.
        runbook_url: https://github.com/kubernetes-monitoring/kubernetes-mixin/tree/master/runbook.md#alert-name-kubepodnotready
      expr: |-
        sum by (namespace, pod) (kube_pod_status_phase{job="kube-state-metrics", phase=~"Pending|Unknown", namespace="hale-platform-prod"}) 
        > 0
      for: 1h
      labels:
        severity: hale-platform-alerts
    - alert: KubeDeploymentGenerationMismatch
      annotations:
        message: Deployment generation for {{ $labels.namespace }}/{{ $labels.deployment
          }} does not match, this indicates that the Deployment has failed but has
          not been rolled back.
        runbook_url: https://github.com/kubernetes-monitoring/kubernetes-mixin/tree/master/runbook.md#alert-name-kubedeploymentgenerationmismatch
      expr: |-
        kube_deployment_status_observed_generation{job="kube-state-metrics", namespace="hale-platform-prod"}
        !=
        kube_deployment_metadata_generation{job="kube-state-metrics", namespace="hale-platform-prod"}
      for: 15m
      labels:
        severity: hale-platform-alerts
    - alert: "Kubernetes Container OOM Killer"
      expr: sum_over_time(kube_pod_container_status_last_terminated_reason{reason="OOMKilled", namespace="hale-platform-prod"}[5m]) > 0
      for: 0m
      labels:
        severity: hale-platform-alerts
      annotations:
        message: "Container {{ $labels.container }} in pod {{ $labels.namespace }}/{{ $labels.pod }} has been OOMKilled."
    - alert: High404Rate
      annotations:
        message: More than 50% of responses were 404 errors.
        runbook_url: "Need to add one"
        dashboard_url: >-
          https://grafana.live.cloud-platform.service.justice.gov.uk/d/k8s-nginx-ingress-prometheus-ng2/b89fb7c?orgId=1&refresh=1m&var-controller_class=$__all&var-pod=$__all&var-datasource=default&from=now-1h&to=now&var-namespace=$__all&var-ingress=hale-platform-ingress&timezone=browser
      expr: |-
        sum by (ingress, cluster) (rate(nginx_ingress_controller_requests{exported_namespace="hale-platform-prod",status="404"}[1m]))
        /
        sum by (ingress) (rate(nginx_ingress_controller_requests{exported_namespace="hale-platform-prod"}[1m]))
        > 0.50
      for: 3m
      labels:
        severity: hale-platform-alerts
    - alert: PodLimitReached
      annotations:
        message: The platform has reached the pod limit.
        runbook_url: http://test.com
      expr: |-
        kube_horizontalpodautoscaler_status_current_replicas{namespace="hale-platform-prod",horizontalpodautoscaler="hale-platform-hpa"}
        == on (namespace, horizontalpodautoscaler)
        kube_horizontalpodautoscaler_spec_max_replicas{namespace="hale-platform-prod",horizontalpodautoscaler="hale-platform-hpa"}
      for: 0m
      labels:
        severity: hale-platform-alerts