apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: supervision-packages-api
  namespace: hmpps-supervision-dev
spec:
  secretName: supervision-packages-api-cert
  issuerRef:
    name: letsencrypt-production
    kind: ClusterIssuer
  dnsNames:
    - supervision-packages-api-dev.hmpps.service.justice.gov.uk