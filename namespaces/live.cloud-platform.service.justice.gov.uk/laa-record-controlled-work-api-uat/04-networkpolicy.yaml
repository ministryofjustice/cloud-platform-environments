apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default
  namespace: laa-record-controlled-work-api-uat
spec:
  podSelector: {}
  policyTypes:
  - Ingress
  ingress:
  - from:
    - podSelector: {}
---
kind: NetworkPolicy
apiVersion: networking.k8s.io/v1
metadata:
  name: allow-ingress-controllers
  namespace: laa-record-controlled-work-api-uat
spec:
  podSelector: {}
  policyTypes:
  - Ingress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          component: ingress-controllers
    - namespaceSelector:
        matchLabels:
          cloud-platform.justice.gov.uk/namespace: laa-record-controlled-work-uat
      podSelector:
        matchLabels:
          app.kubernetes.io/component: rcw
