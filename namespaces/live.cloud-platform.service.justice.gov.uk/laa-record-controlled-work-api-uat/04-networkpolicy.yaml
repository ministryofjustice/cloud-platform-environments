kind: NetworkPolicy
apiVersion: networking.k8s.io/v1
metadata:
  name: allow-ingress-controllers
  namespace: laa-record-controlled-work-api-uat
spec:
  podSelector: {}
  policyTypes:
  - Ingress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          # Ingress restricted to Alpha VPN ranges in Helm.
          component: ingress-controllers
    - namespaceSelector:
        matchLabels:
          cloud-platform.justice.gov.uk/namespace: laa-record-controlled-work-uat
      podSelector:
        matchLabels:
          app.kubernetes.io/component: rcw
    ports:
    - protocol: TCP
      port: 8081
