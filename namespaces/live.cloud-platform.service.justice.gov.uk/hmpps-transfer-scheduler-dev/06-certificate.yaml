---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: hmpps-transfer-scheduler-api-dev-cert
  namespace: hmpps-transfer-scheduler-dev
spec:
  secretName: hmpps-transfer-scheduler-api-cert
  issuerRef:
    name: letsencrypt-production
    kind: ClusterIssuer
  dnsNames:
    - transfer-scheduler-api-dev.hmpps.service.justice.gov.uk
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: hmpps-transfer-scheduler-ui-dev-cert
  namespace: hmpps-transfer-scheduler-dev
spec:
  secretName: hmpps-transfer-scheduler-ui-cert
  issuerRef:
    name: letsencrypt-production
    kind: ClusterIssuer
  dnsNames:
    - transfer-scheduler-dev.hmpps.service.justice.gov.uk
